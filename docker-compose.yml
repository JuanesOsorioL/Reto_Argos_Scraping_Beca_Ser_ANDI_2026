name: RetoArgos
services:

  ferreterias-api:
    build:
      context: ./api-ferreterias       # carpeta donde esta el proyecto
      dockerfile: Dockerfile
    container_name: ferreterias-api
    restart: unless-stopped
    ports:
      - "8009:8009"                    # externo 8008 para no chocar con otros
    environment:
      # ── Base de datos (misma que todos los demas servicios) ──────────────
      DATABASE_URL: postgresql://postgres:1234@postgressArgos:5432/postgres

      # ── IA gratuita OpenRouter ───────────────────────────────────────────
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      PREFERIR_OPENROUTER: "true"

      # ── Anthropic Claude (fallback, opcional) ────────────────────────────
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # ── Serper - busqueda Google (opcional) ─────────────────────────────
      SERPER_API_KEY: ${SERPER_API_KEY:-}

      # ── Webhook n8n (misma URL que usan los otros servicios) ─────────────
      N8N_WEBHOOK_URL: https://drapery-saddlebag-retainer.ngrok-free.dev/webhook/limpiezaDatos
      API_BASE_URL: http://ferreterias-api:8009

      # ── Pipeline ─────────────────────────────────────────────────────────
      USAR_IA_DUPLICADOS: "true"
      INCLUIR_RUES_INACTIVOS: "false"
      CREAR_JSON_CAMPOS_DUDOSOS: "false"
      CREAR_JSON_POSIBLES_MATCHES: "false"

      # ── Rutas dentro del contenedor ──────────────────────────────────────
      RUTA_CAMPOS_DUDOSOS:    /app/respaldos/campos_dudosos
      RUTA_POSIBLES_MATCHES:  /app/respaldos/posibles_matches
      RUTA_REPORTE_EJECUCION: /app/respaldos/reporte_ejecucion

      ENVIRONMENT: production
      LOG_LEVEL: INFO
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    depends_on:
      postgressArgos:
        condition: service_healthy
    volumes:
      - ./api-ferreterias/respaldos:/app/respaldos
    networks:
      - automatizacion_net

  validar-ciudades-api:
    build:
      context: ./ValidarCiudadesAPI
      dockerfile: Dockerfile
    container_name: validar-ciudades-api
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      PORT: 8003

      # OpenRouter opcional
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openrouter/free}

      # Si luego quieres callback a n8n
      N8N_WEBHOOK_URL: http://Argos_n8n:5678/webhook/ValidarCiudades
    depends_on:
      argos_n8n:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - automatizacion_net

  analisis-cobertura-api:
    build:
      context: ./AnalisisCoberturaAPI
      dockerfile: Dockerfile
    container_name: analisis-cobertura-api
    ports:
      - "8008:8008"
    environment:
      DB_HOST: postgressArgos
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: 1234
      UMBRAL_BAJO_COBERTURA: ${UMBRAL_BAJO_COBERTURA:-5}
      ANALISIS_PORT: 8008
    networks:
      - automatizacion_net
    restart: unless-stopped



  ngrok-n8n:
    build:
      context: ./ngrok
      dockerfile: Dockerfile
    container_name: ngrok-n8n
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
      TARGET_HOST: ${TARGET_HOST}
      TARGET_PORT: ${TARGET_PORT}
    volumes:
    - ./ngrok/generated:/shared
    - ./ngrok/ngrok-entrypoint.sh:/ngrok-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/ngrok-entrypoint.sh"]
    ports:
      - "4040:4040"
    networks:
      - automatizacion_net

  postgressArgos:
    image: postgres@sha256:5773fe724c49c42a7a9ca70202e11e1dff21fb7235b335a73f39297d200b73a2
    container_name: postgressArgos
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "1111:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U postgres -d postgres || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - automatizacion_net

  argos_n8n:
    #image: docker.n8n.io/n8nio/n8n@sha256:52bc65540cbfb6f8b5320bafaf28bcc018ae08124bb0a7cbf5ca7f044b54d698
    build:
      context: ./n8n
      dockerfile: Dockerfile
    container_name: argos_n8n
    user: root
    restart: unless-stopped
    ports:
      - "2222:5678"
    env_file:
    - ./ngrok/generated/n8n-ngrok.env
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgressArgos
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: postgres
      DB_POSTGRESDB_USER: postgres
      DB_POSTGRESDB_PASSWORD: 1234
      #N8N_HOST: Argos_n8n
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      #WEBHOOK_URL: http://localhost:2222/
      GENERIC_TIMEZONE: America/Bogota
      N8N_ENABLE_EXECUTE_COMMAND: true
      NODES_EXCLUDE: "[]"
      N8N_ENCRYPTION_KEY: "yU11TiIfoQ8Z/Aakhr9qAg/QRcsSF3oE"
      # 🔥 Optimización RAM
      EXECUTIONS_DATA_SAVE_ON_SUCCESS: all
      EXECUTIONS_DATA_MAX_AGE: 24
      EXECUTIONS_DATA_SAVE_ON_ERROR: all
      EXECUTIONS_DATA_PRUNE: true

      # 🧹 Menos overhead
      N8N_DIAGNOSTICS_ENABLED: false
      N8N_METRICS: false

    depends_on:
      postgressArgos:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - automatizacion_net




  rues-api:
    build:
      context: ./RUES
      dockerfile: Dockerfile
    container_name: rues-api
    restart: unless-stopped
    ports:
      - "8006:8006"
    environment:
      NODE_ENV: production
      PORT: 8006

      DB_HOST: postgressArgos
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: 1234

      DEBUG_MODE: "false"
      WRITE_LOG_FILE: "false"
      WRITE_OUTPUT: "false"

      N8N_WEBHOOK_URL: http://Argos_n8n:5678/webhook/Rues
    depends_on:
      postgressArgos:
        condition: service_healthy
      #Argos_n8n:
      #  condition: service_started
    networks:
      - automatizacion_net

  argos-maps-api:
    build:
      context: ./ArgosMaps
      dockerfile: Dockerfile
    container_name: argos-maps-api
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      DB_HOST: postgressArgos
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: 1234
      GUARDAR_JSONL_LOCAL: "false"
      N8N_WEBHOOK_URL: http://Argos_n8n:5678/webhook/ScrapingGoogleMaps
    depends_on:
      postgressArgos:
        condition: service_healthy
      #Argos_n8n:
      #  condition: service_started
    networks:
      - automatizacion_net

  paginas-amarillas-api:
    build:
      context: ./ArgosPaginasAmarillas
      dockerfile: Dockerfile
    container_name: paginas-amarillas-api
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      PORT: 8002

      DB_HOST: postgressArgos
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: 1234

      HEADLESS: "true"
      SAVE_JSON_BACKUP: "false"

      CONCURRENCIA_PESTANAS: "2"
      TIEMPO_ESPERA_MIN: "1.0"
      TIEMPO_ESPERA_MAX: "3.0"

      OUTPUT_FILE: "base_de_datos_argos.jsonl"
      OUTPUT_EXCEL: "Data_Filtrada_Argos.xlsx"

      N8N_WEBHOOK_URL: http://Argos_n8n:5678/webhook/PaginasAmarillas
    depends_on:
      postgressArgos:
        condition: service_healthy
      #Argos_n8n:
      #  condition: service_started
    networks:
      - automatizacion_net

  serper-api:
    # ─── BUILD ─────────────────────────────────────────────────────────────────
    build:
      context: ./SerperAPI
      dockerfile: Dockerfile
    
    # ─── IDENTIFICACIÓN ────────────────────────────────────────────────────────
    container_name: serper-api
    restart: unless-stopped
    
    # ─── PUERTOS ───────────────────────────────────────────────────────────────
    # 8004: FastAPI (HTTP API)
    ports:
      - "8004:8004"
    
    # ─── VARIABLES DE ENTORNO ──────────────────────────────────────────────────
    environment:

      
      # ─── BASE DE DATOS ─────────────────────────────────────────────────────
      # Conecta a la misma BD PostgreSQL que el resto
      DB_HOST: postgressArgos
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: 1234
      
      # ─── CONTROL DE GUARDADO ───────────────────────────────────────────────
      # JSON locales (backup): false = NO guardar (solo Postgres)
      SAVE_JSON_BACKUP: "false"
      
      # Archivo de progreso (para reanudación)
      SAVE_PROGRESS_FILE: "true"
      
      # ─── PAUSA AUTOMÁTICA POR RATE LIMIT ───────────────────────────────────
      # Auto-reintentar cuando Serper devuelve 429
      AUTO_RESUME_ON_RATE_LIMIT: "true"
      
      # Cuántos segundos esperar entre reintentos (15 min = 900 seg)
      RATE_LIMIT_SLEEP_SECONDS: "900"
      
      # Máximo de reintentos consecutivos antes de parar
      MAX_CONSECUTIVE_RATE_LIMITS: "20"
      
      # ─── WEBHOOK N8N ───────────────────────────────────────────────────────
      # URL donde enviar notificaciones cuando se pause/termine
      # Comunicación interna entre containers: usa nombre del container + puerto
      N8N_WEBHOOK_URL: "http://Argos_n8n:5678/webhook/Serper"
      
      # ─── PUERTO ────────────────────────────────────────────────────────────
      PORT: "8004"
      
      # ─── PYTHON ────────────────────────────────────────────────────────────
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    
    # ─── DEPENDENCIAS ──────────────────────────────────────────────────────────
    # Esperar a que PostgreSQL esté saludable antes de iniciar
    depends_on:
      postgressArgos:
        condition: service_healthy
    
    # ─── RED ───────────────────────────────────────────────────────────────────
    # Conectar a la red para comunicarse con otros servicios
    networks:
      - automatizacion_net
    
    # ─── HEALTHCHECK ──────────────────────────────────────────────────────────
    # Verificar cada 30s que la API está viva
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  openstreetmap-api:
    build:
      context: ./OpenStreetMapsAPI
      dockerfile: Dockerfile
    container_name: openstreetmap-api
    restart: unless-stopped
    ports:
      - "8007:8007"
    environment:
      PORT: 8007

      DB_HOST: postgressArgos
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: 1234

      SAVE_LOG_FILES: "false"
      SAVE_OUTPUT_FILES: "false"

      N8N_WEBHOOK_URL: http://Argos_n8n:5678/webhook/OpenStreetMap
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    depends_on:
      postgressArgos:
        condition: service_healthy
      #Argos_n8n:
      #  condition: service_started
    networks:
      - automatizacion_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


  foursquare-api:
    # Construir imagen desde Dockerfile
    build:
      context: ./FoursquareAPI
      dockerfile: Dockerfile
    
    # Nombre del servicio
    container_name: foursquare-api
    
    # Variables de entorno
    environment:
      # Base de datos
      DB_HOST: postgressArgos
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: 1234
      
      
      
      # Control de pausa automática
      AUTO_PAUSE_ON_RATE_LIMIT: "true"
      RATE_LIMIT_SLEEP_SECONDS: "3600"
      MAX_CONSECUTIVE_RATE_LIMITS: "5"
      AUTO_RESUME_AFTER_PAUSE: "true"
      
      # JSON Backup
      SAVE_JSON_BACKUP: "false"
      SAVE_PROGRESS_FILE: "false"
      
      # Webhooks a n8n
      WEBHOOK_ON_PAUSE: "http://host.docker.internal:5678/webhook/foursquare-pause"
      WEBHOOK_ON_COMPLETE: http://Argos_n8n:5678/webhook/foursquare-complete
      #WEBHOOK_ON_COMPLETE: "http://host.docker.internal:5678/webhook/foursquare-complete"
      WEBHOOK_ON_ERROR: "http://host.docker.internal:5678/webhook/foursquare-error"
      
      # API Server
      API_PORT: 8005
      API_HOST: 0.0.0.0
      DEBUG: "true"
    
    # Puertos: INTERNO:EXTERNO
    ports:
      # FastAPI en puerto 8005
      - "8005:8005"
    
    # Volúmenes
    volumes:
      # Guardar archivos de salida en el host
      - ./output:/app/output
      
      # Guardar JSONL locales
      - ./data:/app/data
      
      # Código fuente (opcional, para desarrollo)
      # - .:/app
    
    # Dependencias: esperar a que PostgreSQL esté listo
    depends_on:
      postgressArgos:
        condition: service_healthy
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Reiniciar si falla
    restart: unless-stopped
    
    # Logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Red
    networks:
      - automatizacion_net


  argos-dashboard:
    build:
      context: ./streamlit
      dockerfile: Dockerfile
    container_name: argos-dashboard
    restart: unless-stopped
    ports:
      - "8050:8050"   # Streamlit UI
      - "8010:8010"   # FastAPI control (webhooks de n8n)
    environment:
      DATABASE_URL: postgresql://postgres:1234@postgressArgos:5432/postgres
      STATE_FILE: /app/state/refresh.json
    volumes:
      - ./streamlit/data:/app/data         # Excel de clientes Argos
      - dashboard_state:/app/state         # State file compartido entre FastAPI y Streamlit
    depends_on:
      postgressArgos:
        condition: service_healthy
    networks:
      - automatizacion_net

volumes:
  postgres_data:
  n8n_data:
  dashboard_state:

networks:
  automatizacion_net:
    driver: bridge
